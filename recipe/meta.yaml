{% set version = "0.4.3" %}
{% set hash_val = "78a157fbe0f52250e96e19ee769cd064" %}

package:
  name: resampy
  version: {{ version }}

source:
  fn: resampy-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/r/resampy/resampy-{{ version }}.tar.gz
  md5: {{ hash_val }}

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - wheel >=0.29.0
    - importlib-resources

  run:
    - python >={{ python_min }}
    - numpy >=1.17.0
    - numba >=0.53
    - importlib-resources

test:
  requires:
    - python {{ python_min }}
  imports:
    - resampy

about:
  home: https://github.com/bmcfee/resampy
  license: ISC
  summary: 'Efficient signal resampling'

extra:
  recipe-maintainers:
    - bmcfee
